<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaElia</title>

<meta property="og:title" content="LaElia">
<meta property="og:description" content="Joyeux anniversaire Laëlia">
<meta property="og:image" content="pochette-laelia.png">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;
  overflow:hidden;
  background:#030014;
  color:white;
  font-family:Arial, sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
}

.bg{
  position:fixed;
  inset:0;
  background:url("pochette-laelia.png") center/cover no-repeat;
  filter:blur(34px) brightness(.55) saturate(1.35);
  transform:scale(1.18);
  z-index:-4;
}

.light{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 50% 42%, rgba(255,235,150,.42), transparent 32%),
    radial-gradient(circle at 20% 18%, rgba(255,120,255,.28), transparent 28%),
    radial-gradient(circle at 82% 22%, rgba(80,190,255,.30), transparent 30%),
    linear-gradient(180deg, rgba(0,0,30,.10), rgba(0,0,0,.55));
  z-index:-3;
}

.stars{
  position:fixed;
  inset:0;
  overflow:hidden;
  z-index:-2;
  pointer-events:none;
}

.star{
  position:absolute;
  width:4px;
  height:4px;
  background:white;
  border-radius:50%;
  box-shadow:0 0 10px white,0 0 22px gold,0 0 35px #ffd76a;
  animation:twinkle 2.8s infinite ease-in-out;
}

@keyframes twinkle{
  0%,100%{opacity:.25;transform:scale(.7)}
  50%{opacity:1;transform:scale(1.7)}
}

.shooting{
  position:absolute;
  width:120px;
  height:2px;
  background:linear-gradient(90deg, transparent, white, gold);
  opacity:.85;
  transform:rotate(-28deg);
  animation:shoot 5.5s infinite linear;
}

@keyframes shoot{
  0%{transform:translate(-30vw,-10vh) rotate(-28deg);opacity:0}
  10%{opacity:1}
  35%{opacity:0}
  100%{transform:translate(130vw,70vh) rotate(-28deg);opacity:0}
}

.container{
  width:100%;
  min-height:100vh;
  padding:22px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

.title{
  margin-bottom:22px;
  font-size:clamp(2rem,5vw,4.2rem);
  font-weight:900;
  color:#ffe68a;
  text-shadow:
    0 0 10px #fff,
    0 0 24px #ffd76a,
    0 0 46px #ff88ff;
  animation:titleGlow 2.8s infinite alternate ease-in-out;
}

@keyframes titleGlow{
  from{filter:brightness(1)}
  to{filter:brightness(1.35)}
}

.disc-wrap{
  position:relative;
  width:min(78vw,440px);
  height:min(78vw,440px);
  display:flex;
  align-items:center;
  justify-content:center;
}

.disc-wrap::before{
  content:"";
  position:absolute;
  inset:-28px;
  border-radius:50%;
  background:
    conic-gradient(from 0deg, transparent, rgba(255,230,120,.75), transparent, rgba(255,130,255,.55), transparent, rgba(100,220,255,.6), transparent);
  filter:blur(10px);
  animation:halo 9s linear infinite;
  opacity:.9;
}

.disc-wrap::after{
  content:"✦ ✧ ✦ ✧ ✦ ✧ ✦";
  position:absolute;
  inset:-48px;
  border-radius:50%;
  color:#fff4a8;
  font-size:28px;
  letter-spacing:18px;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  text-shadow:0 0 12px white,0 0 26px gold;
  animation:orbit 12s linear infinite;
  pointer-events:none;
}

@keyframes halo{to{transform:rotate(360deg)}}
@keyframes orbit{to{transform:rotate(-360deg)}}

.disc{
  position:relative;
  width:100%;
  height:100%;
  border-radius:50%;
  overflow:hidden;
  box-shadow:
    0 0 25px rgba(255,255,255,.65),
    0 0 60px rgba(255,220,90,.65),
    0 0 110px rgba(255,110,255,.40);
  z-index:2;
}

.disc::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  background:repeating-radial-gradient(circle, rgba(255,255,255,.08) 0 1px, transparent 2px 5px);
  mix-blend-mode:soft-light;
  z-index:2;
  pointer-events:none;
}

.disc img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:50%;
}

.spin{animation:rotation 13s linear infinite}
@keyframes rotation{to{transform:rotate(360deg)}}

.controls{
  margin-top:26px;
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  justify-content:center;
}

button{
  border:0;
  border-radius:999px;
  padding:14px 26px;
  font-size:1.05rem;
  font-weight:800;
  cursor:pointer;
  color:#2a1300;
  background:linear-gradient(135deg,#fff6bd,#ffd166,#fff);
  box-shadow:0 0 18px rgba(255,230,120,.7),0 0 42px rgba(255,130,255,.32);
}

button:active{transform:scale(.96)}

.hint{
  margin-top:14px;
  font-size:.95rem;
  opacity:.85;
  text-shadow:0 0 10px #000;
}

audio{display:none}

@media(max-width:700px){
  .container{justify-content:center;padding:16px}
  .disc-wrap{width:84vw;height:84vw}
  .title{margin-bottom:18px}
  .disc-wrap::after{font-size:20px;letter-spacing:12px;inset:-34px}
}
</style>
</head>

<body>
<div class="bg"></div>
<div class="light"></div>
<div class="stars" id="stars"></div>

<main class="container">
  <div class="title">Joyeux anniversaire LaElia</div>

  <div class="disc-wrap">
    <div class="disc" id="vinyl">
      <img src="pochette-laelia.png" alt="LaElia">
    </div>
  </div>

  <div class="controls">
    <button id="startBtn">✨ Entrer dans la magie ✨</button>
    <button id="pauseBtn">⏸ Pause</button>
  </div>

  <div class="hint">La musique démarre automatiquement si le navigateur l’autorise. Sinon, toucher le bouton.</div>

  <audio id="audio" preload="auto">
    <source src="chanson-laelia.mp3" type="audio/mpeg">
  </audio>
</main>

<script>
const audio = document.getElementById("audio");
const vinyl = document.getElementById("vinyl");
const startBtn = document.getElementById("startBtn");
const pauseBtn = document.getElementById("pauseBtn");
const stars = document.getElementById("stars");

for(let i=0;i<90;i++){
  const s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"%";
  s.style.top=Math.random()*100+"%";
  s.style.animationDelay=(Math.random()*3)+"s";
  s.style.animationDuration=(1.8+Math.random()*3.5)+"s";
  stars.appendChild(s);
}

for(let i=0;i<5;i++){
  const sh=document.createElement("div");
  sh.className="shooting";
  sh.style.top=(Math.random()*45)+"%";
  sh.style.left=(-20-Math.random()*40)+"%";
  sh.style.animationDelay=(i*1.8)+"s";
  stars.appendChild(sh);
}

function playMagic(){
  audio.play().catch(()=>{});
}

startBtn.addEventListener("click", playMagic);
pauseBtn.addEventListener("click", ()=>audio.pause());

audio.addEventListener("play", ()=>vinyl.classList.add("spin"));
audio.addEventListener("pause", ()=>vinyl.classList.remove("spin"));
audio.addEventListener("ended", ()=>vinyl.classList.remove("spin"));

window.addEventListener("load", ()=>{
  setTimeout(playMagic, 500);
});

document.body.addEventListener("touchstart", ()=>{
  if(audio.paused) playMagic();
},{once:true});

document.body.addEventListener("click", ()=>{
  if(audio.paused) playMagic();
},{once:true});
</script>
</body>
</html>
