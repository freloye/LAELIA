<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LaElia</title>
<meta property="og:title" content="LaElia">
<meta property="og:description" content="Joyeux anniversaire LaElia">
<meta property="og:image" content="pochette-laelia.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#000;overflow:hidden;height:100vh;display:flex;justify-content:center;align-items:center;color:#fff}
.bg{position:fixed;inset:0;background:url("pochette-laelia.png") center/cover no-repeat;filter:blur(35px) brightness(.45);transform:scale(1.15);z-index:-2}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:-1}
.container{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;padding:20px}
.disc{width:min(75vw,420px);height:min(75vw,420px);border-radius:50%;overflow:hidden;box-shadow:0 0 40px rgba(255,255,255,.15),0 0 80px rgba(255,255,255,.10)}
.disc img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.spin{animation:rotation 15s linear infinite}
@keyframes rotation{from{transform:rotate(0)}to{transform:rotate(360deg)}}
h1{margin-top:25px;font-size:clamp(1.8rem,4vw,3rem)}
.controls{margin-top:25px;display:flex;gap:15px}
button{padding:12px 24px;font-size:1rem;border:none;border-radius:30px;cursor:pointer;background:#fff;color:#000;font-weight:bold}
audio{display:none}
</style>
</head>
<body>
<div class="bg"></div>
<div class="overlay"></div>
<div class="container">
<div class="disc" id="vinyl"><img src="pochette-laelia.png" alt="LaElia"></div>
<h1>Joyeux anniversaire LaElia</h1>
<div class="controls">
<button id="playBtn">▶ Lecture</button>
<button id="pauseBtn">⏸ Pause</button>
</div>
<audio id="audio"><source src="chanson-laelia.mp3" type="audio/mpeg"></audio>
</div>
<script>
const audio=document.getElementById('audio');
const vinyl=document.getElementById('vinyl');
playBtn.onclick=()=>audio.play();
pauseBtn.onclick=()=>audio.pause();
audio.onplay=()=>vinyl.classList.add('spin');
audio.onpause=()=>vinyl.classList.remove('spin');
audio.onended=()=>vinyl.classList.remove('spin');
</script>
</body>
</html>
